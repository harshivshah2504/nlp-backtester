[build]
  command = "pip install uv && uv pip install -r requirements.txt --system && python backtest_crew/dashboard.py"
  publish = "backtest_crew/netlify_dashboard"

[build.environment]
  PYTHON_VERSION = "3.12"
  NETLIFY_BACKTEST_API_BASE_URL = "https://nlp-backtester.onrender.com"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
